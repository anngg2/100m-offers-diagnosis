<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$100M Offer Diagnosis — Free Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#080808;
  color:#f4efe6;
  font-family:'DM Sans',sans-serif;
}

.container {
  max-width:720px;
  margin:0 auto;
  padding:40px 20px;
}

h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size:72px;
  line-height:1;
}

textarea {
  width:100%;
  height:220px;
  margin-top:20px;
  padding:15px;
  background:#111;
  color:#fff;
  border:1px solid #333;
}

button {
  width:100%;
  margin-top:20px;
  padding:18px;
  background:#e03120;
  color:#fff;
  border:none;
  font-size:22px;
  font-family:'Bebas Neue';
  cursor:pointer;
}

.results {
  margin-top:50px;
}

.results h2 {
  font-family:'Bebas Neue';
  margin-top:40px;
}

.results hr {
  border:none;
  border-top:1px solid #333;
  margin:30px 0;
}

.results ul {
  padding-left:20px;
}

.cta {
  margin-top:50px;
  padding:30px;
  border:1px solid #333;
  text-align:center;
}

.cta a {
  display:block;
  margin-top:20px;
  padding:15px;
  background:#e03120;
  color:#fff;
  text-decoration:none;
  font-size:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Your Offer Has Problems.<br>Fix Them.</h1>

<textarea id="input"></textarea>

<button onclick="run()">DIAGNOSE MY OFFER</button>

<div id="output" class="results"></div>

<div class="cta">
  <p>With a few fixes, this could easily become a <strong>9/10 offer</strong>.</p>
  <a href="https://cecila2.gumroad.com/l/ilhmg" target="_blank">
    GET THE COMPLETE SYSTEM — $27
  </a>
</div>

</div>

<script>
const API_KEY = "YOUR_API_KEY";

const PROMPT = `
You are a world-class Offer Strategist trained by Alex Hormozi.

Analyze using $100M Offers.

STYLE:
- Encouraging but honest
- Start with strengths

FORMAT:

## 1. Overall Grand Slam Score
Score + summary

---

## 2. Value Equation
Dream Outcome  
Likelihood  
Time Delay  
Effort  

---

## 3. What’s Working Well
- points

---

## 4. Opportunities
Quote + explanation + direction

---

## 5. Diagnosis
Category of One  
Bonuses  
Guarantee  
Scarcity  
Score  

---

## 6. Next Step

Rules:
No full rewrite.
`;

async function run() {
  const text = document.getElementById("input").value;

  const res = await fetch("https://api.deepseek.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify({
      model: "deepseek-chat",
      temperature: 0.7,
      messages: [
        { role: "system", content: PROMPT },
        { role: "user", content: text }
      ]
    })
  });

  const data = await res.json();
  const output = data.choices[0].message.content;

  render(output);
}

function render(md) {
  let html = md
    .replace(/^## (.*$)/gim, '<h2>$1</h2>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.*$)/gim, '<li>$1</li>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/---/g, '<hr>');

  html = html.replace(/(<li>.*<\/li>)/g, '<ul>$1</ul>');

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
